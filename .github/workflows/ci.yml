name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout go-codex-sdk dependency
        uses: actions/checkout@v4
        with:
          repository: diasYuri/go-codex-sdk
          path: ${{ github.workspace }}/../go-codex-sdk

      - name: Fix local replace directive
        run: go mod edit -replace github.com/diasYuri/go-codex-sdk=${{ github.workspace }}/../go-codex-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test -race -shuffle=on ./internal/... ./cmd/agentflow/... ./cmd/agentflowd/...

      - name: Build binaries
        run: |
          go build ./cmd/agentflow
          go build ./cmd/agentflowd

      - name: Run go vet
        run: go vet ./internal/... ./cmd/agentflow/... ./cmd/agentflowd/...

  e2e-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout go-codex-sdk dependency
        uses: actions/checkout@v4
        with:
          repository: diasYuri/go-codex-sdk
          path: ${{ github.workspace }}/../go-codex-sdk

      - name: Fix local replace directive
        run: go mod edit -replace github.com/diasYuri/go-codex-sdk=${{ github.workspace }}/../go-codex-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fast E2E tests
        run: go test -tags=e2e -v -count=1 -timeout=10m ./test/e2e/...

  e2e-slow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout go-codex-sdk dependency
        uses: actions/checkout@v4
        with:
          repository: diasYuri/go-codex-sdk
          path: ${{ github.workspace }}/../go-codex-sdk

      - name: Fix local replace directive
        run: go mod edit -replace github.com/diasYuri/go-codex-sdk=${{ github.workspace }}/../go-codex-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run slow E2E tests
        run: go test -tags="e2e integration" -v -count=1 -timeout=10m ./test/e2e/...
