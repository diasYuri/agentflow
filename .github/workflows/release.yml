name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout go-codex-sdk dependency
        uses: actions/checkout@v4
        with:
          repository: diasYuri/go-codex-sdk
          ref: b88b9cb862e1388b5b4939ef0f4d5de159965ecc
          path: ${{ github.workspace }}/../go-codex-sdk

      - name: Fix local replace directive
        run: go mod edit -replace github.com/diasYuri/go-codex-sdk=${{ github.workspace }}/../go-codex-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/release.sh "${VERSION}" "${{ matrix.os }}" "${{ matrix.arch }}" dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentflow-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/agentflow-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.*

  checksums:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum agentflow-* > SHA256SUMS.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/SHA256SUMS.txt

  sbom:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: agentflow-${{ github.ref_name }}-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: agentflow-${{ github.ref_name }}-sbom.spdx.json

  release:
    runs-on: ubuntu-latest
    needs: [build, checksums, sbom]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(find dist -type f | sort | tr '\n' ' ')
          gh release create "${GITHUB_REF_NAME}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            ${files}
