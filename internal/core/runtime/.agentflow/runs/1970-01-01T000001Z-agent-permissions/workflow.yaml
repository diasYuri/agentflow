
version: "1"
name: agent-permissions
nodes:
  - id: write_enabled
    kind: agent
    permission:
      write: true
    prompt: "write mode"
  - id: write_disabled
    kind: agent
    permission:
      write: false
    prompt: "read mode"
  - id: explicit_sandbox
    kind: agent
    permission:
      write: true
    sandbox:
      mode: danger-full-access
    prompt: "explicit sandbox"
