version: "2"
name: feat-v2
description: "Recebe uma descrição de feature, gera planos em .agentflow/plans, implementa cada plano em ordem, revisa e aplica ajustes finais."

inputs:
  feature:
    type: string
    required: true

defaults:
  timeout: 12000
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 1
  fail_fast: true
  pause_when_fail: true
  max_node_output_bytes: 1048576

worktree:
  enabled: true
  provider: pi
  base: current
  merge:
    strategy: deterministic
    on_conflict: agent
  cleanup:
    on_success: true
    on_failure: keep

hooks:
  - phase: before_run
    kind: bash
    command: echo "Iniciando workflow feature-plan-implementation-v2"
  - phase: after_success
    kind: bash
    command: echo "Workflow feature-plan-implementation-v2 concluido com sucesso"
  - phase: after_failure
    kind: bash
    command: echo "Workflow feature-plan-implementation-v2 finalizado com falha"

steps:
  create_implementation_plans:
    nodes:
      - id: create_implementation_plans
        kind: agent
        provider: codex
        permission:
          write: true
        prompt: |
          You are a senior technical planner working inside this repository.

          Your job is to break the feature below into Markdown implementation plans inside `.agentflow/plans/`.

          Do not create more plans than are necessary to implement the feature.

          Feature:
          ${inputs.feature}

          Rules:
          - Inspect the repository before planning.
          - Create `.agentflow/plans/<feature-name>/` if it does not already exist.
          - Each plan must fit into one implementation session.
          - The plans must be ordered, small, objective, and free of unnecessary overlap.
          - Use stable names such as `.agentflow/plans/<feature-name>/001-short-slug.md`.
          - Each plan file must include: objective, context, scope, likely files, implementation steps, validation, and risks.
          - Do not implement the feature in this node; only write the plan files.
          - Return valid JSON that follows the schema.
        outputs:
          plans:
            type: array
        output_schema:
          type: object
          required:
            - plans
          additionalProperties: false
          properties:
            plans:
              type: array
              minItems: 1
              items:
                type: object
                required:
                  - path
                  - description
                additionalProperties: false
                properties:
                  path:
                    type: string
                  description:
                    type: string

  implement_plan:
    nodes:
      - id: implement_plan
        kind: agent
        provider: pi
        permission:
          write: true
        prompt: |
          You are the implementation agent operating inside the current repository.

          Implement exactly this plan, respecting the workflow order:
          ${item}

          Rules:
          - Read the file referenced in `path` before changing code.
          - Implement only the scope of the current plan.
          - Do not revert or overwrite existing work or earlier plan changes.
          - Preserve the repository's existing architecture, boundaries, naming, and style.
          - Build software that is tested, maintainable, and easy to evolve.
          - Favor clear design over cleverness.
          - Apply pragmatic SOLID principles, small focused functions, narrow interfaces, and explicit dependencies.
          - Avoid unnecessary abstraction, but extract helpers or types when duplication or complexity starts to hide intent.
          - Add or update tests for every behavior change, regression risk, or bug fix introduced by the plan.
          - Prefer small, focused test coverage that proves the behavior end to end within the plan scope.
          - Run relevant fast local validations before finishing.
          - Return valid JSON that follows the schema.
        outputs:
          plan_path:
            type: string
          status:
            type: string
          summary:
            type: string
          files_changed:
            type: array
          validation:
            type: array
          follow_ups:
            type: array
        output_schema:
          type: object
          required:
            - plan_path
            - status
            - summary
            - files_changed
            - validation
            - follow_ups
          additionalProperties: false
          properties:
            plan_path:
              type: string
            status:
              type: string
            summary:
              type: string
            files_changed:
              type: array
              items:
                type: string
            validation:
              type: array
              items:
                type: string
            follow_ups:
              type: array
              items:
                type: string

  review_implementation:
    nodes:
      - id: review_implementation
        kind: agent
        provider: codex
        depends_on: [implement_plans]
        prompt: |
          You are a pragmatic code reviewer.

          Review the complete implementation after all plans have finished.

          Original feature:
          ${inputs.feature}

          Generated plans:
          ${nodes.create_implementation_plans.output.plans}

          Implementation results:
          ${nodes.implement_plans.outputs}

          Rules:
          - Prioritize real bugs, regressions, missing tests, and feature mismatches.
          - Verify that the plans were implemented in order and without scope drift.
          - Do not modify files in this node; only review.
          - Return valid JSON that follows the schema.
        outputs:
          status:
            type: string
          findings:
            type: array
          recommended_fine_tuning:
            type: array
        output_schema:
          type: object
          required:
            - status
            - findings
            - recommended_fine_tuning
          additionalProperties: false
          properties:
            status:
              type: string
            findings:
              type: array
              items:
                type: object
                required:
                  - severity
                  - description
                  - evidence
                  - recommendation
                additionalProperties: false
                properties:
                  severity:
                    type: string
                  description:
                    type: string
                  evidence:
                    type: string
                  recommendation:
                    type: string
            recommended_fine_tuning:
              type: array
              items:
                type: string

  fine_tune:
    nodes:
      - id: fine_tune
        kind: agent
        provider: codex
        depends_on: [review_implementation]
        permission:
          write: true
        prompt: |
          You are the final fine-tuning agent.

          Apply only the adjustments required by the review.

          Original feature:
          ${inputs.feature}

          Plans:
          ${nodes.create_implementation_plans.output.plans}

          Implementations:
          ${nodes.implement_plans.outputs}

          Review:
          ${nodes.review_implementation.output}

          Rules:
          - Fix the review findings that are actually relevant.
          - Keep the scope strictly tied to the feature and the plans.
          - Do not rewrite the implementation unless it is necessary.
          - Preserve changes made by previous plans.
          - Run relevant fast local validations.
          - Return a concise final summary.
        outputs:
          status:
            type: string
          summary:
            type: string
          files_changed:
            type: array
          validation:
            type: array
          remaining_risks:
            type: array
        output_schema:
          type: object
          required:
            - status
            - summary
            - files_changed
            - validation
            - remaining_risks
          additionalProperties: false
          properties:
            status:
              type: string
            summary:
              type: string
            files_changed:
              type: array
              items:
                type: string
            validation:
              type: array
              items:
                type: string
            remaining_risks:
              type: array
              items:
                type: string

nodes:
  - id: create_implementation_plans
    ref: create_implementation_plans

  - id: implement_plans
    kind: map
    depends_on: [create_implementation_plans]
    for_each: "${nodes.create_implementation_plans.output.plans}"
    concurrency: 1
    max_items: 50
    fail_fast: true
    nodes:
      - id: implement_plan
        ref: implement_plan

  - id: review_implementation
    ref: review_implementation

  - id: fine_tune
    ref: fine_tune

outputs:
  status:
    value: "${nodes.fine_tune.output.status}"
    type: string
  plans:
    value: "${nodes.create_implementation_plans.output.plans}"
    type: array
  implementations:
    value: "${nodes.implement_plans.outputs}"
    type: array
  review:
    value: "${nodes.review_implementation.output}"
    type: object
  final:
    value: "${nodes.fine_tune.output}"
    type: object
