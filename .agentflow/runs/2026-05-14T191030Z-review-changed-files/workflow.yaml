version: "1"
name: review-changed-files
description: "Revisa arquivos alterados em paralelo e consolida findings."

inputs:
  files:
    type: array
    required: true

defaults:
  timeout: 600
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 4
  fail_fast: false
  output_dir: ".agentflow/runs"

nodes:
  - id: split_files
    kind: transform
    operation: chunk
    input: "${inputs.files}"
    with:
      chunks: 3

  - id: review_chunk
    kind: agent
    provider: codex
    depends_on: [split_files]
    for_each: "${nodes.split_files.output}"
    concurrency: 2
    max_items: 10
    fail_fast: false
    prompt: |
      Revise este grupo de arquivos como code reviewer pragmático:

      ${item}

      Procure:
      - bugs reais
      - regressões de comportamento
      - testes ausentes
      - riscos de segurança óbvios

      Retorne findings priorizados e sugestões objetivas.

  - id: merge_reviews
    kind: transform
    depends_on: [review_chunk]
    operation: merge
    input: "${nodes.review_chunk.outputs}"

  - id: final_review
    kind: agent
    provider: codex
    depends_on: [merge_reviews]
    prompt: |
      Consolide os reviews abaixo em um relatório final curto.

      Reviews:
      ${nodes.merge_reviews.output}

