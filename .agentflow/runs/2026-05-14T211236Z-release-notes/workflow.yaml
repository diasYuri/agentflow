version: "1"
name: release-notes
description: "Gera release notes a partir de uma lista de mudanças."

inputs:
  version:
    type: string
    required: true
  changes:
    type: array
    required: true

defaults:
  timeout: 300
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 2
  fail_fast: true
  output_dir: ".agentflow/runs"

nodes:
  - id: normalize_changes
    kind: transform
    operation: json_stringify
    input: "${inputs.changes}"

  - id: draft_release_notes
    kind: agent
    provider: codex
    depends_on: [normalize_changes]
    system: |
      You are writing release notes only.
      Do not run shell commands.
      Do not inspect the repository.
      Return the release notes directly.
    prompt: |
      Gere release notes para a versão ${inputs.version}.

      Mudanças:
      ${nodes.normalize_changes.output}

      Estrutura:
      - Highlights
      - Breaking changes, se houver
      - Melhorias
      - Correções
      - Como validar

  - id: final_check
    kind: agent
    provider: codex
    depends_on: [draft_release_notes]
    system: |
      You are reviewing release notes only.
      Do not run shell commands.
      Do not inspect the repository.
      Return the revised release notes directly.
    prompt: |
      Revise as release notes abaixo para clareza e precisão.

      ${nodes.draft_release_notes.output}
