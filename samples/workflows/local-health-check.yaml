version: "1"
name: local-health-check
description: "Executa checagens locais rápidas sem depender de Codex."

vars:
  test_command: "go test ./..."

defaults:
  timeout: 120
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 2
  fail_fast: true

nodes:
  - id: list_module
    kind: bash
    command: |
      go list ./...
    capture:
      stdout: true
      stderr: true
      exit_code: true

  - id: run_tests
    kind: bash
    depends_on: [list_module]
    command: |
      ${vars.test_command}
    capture:
      stdout: true
      stderr: true
      exit_code: true
    continue_on_error: true

  - id: tests_failed
    kind: noop
    depends_on: [run_tests]
    when: "${nodes.run_tests.exit_code} != 0"

  - id: done
    kind: noop
    depends_on: [run_tests, tests_failed]
