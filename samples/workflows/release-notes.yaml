version: "1"
name: release-notes
description: "Gera release notes a partir de uma lista de mudanças."

inputs:
  version:
    type: string
    required: true
  changes:
    type: array
    required: true

defaults:
  timeout: 300
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 2
  fail_fast: true

nodes:
  - id: normalize_changes
    kind: transform
    operation: json_stringify
    input: "${inputs.changes}"

  - id: draft_release_notes
    kind: agent
    provider: codex
    depends_on: [normalize_changes]
    system: |
      You are writing release notes only.
      Do not run shell commands.
      Do not inspect the repository.
      Return only valid JSON matching the schema.
    output_schema:
      type: object
      properties:
        summary:
          type: string
        highlights:
          type: array
          items:
            type: string
        breaking_changes:
          type: array
          items:
            type: string
        improvements:
          type: array
          items:
            type: string
        corrections:
          type: array
          items:
            type: string
        validation:
          type: array
          items:
            type: string
      required:
        - summary
        - highlights
        - breaking_changes
        - improvements
        - corrections
        - validation
      additionalProperties: false
    prompt: |
      Gere release notes para a versão ${inputs.version}.

      Mudanças:
      ${nodes.normalize_changes.output}

      Responda somente com JSON.

  - id: final_check
    kind: agent
    provider: codex
    depends_on: [draft_release_notes]
    system: |
      You are reviewing release notes only.
      Do not run shell commands.
      Do not inspect the repository.
      Return only valid JSON matching the schema.
    output_schema:
      type: object
      properties:
        summary:
          type: string
        highlights:
          type: array
          items:
            type: string
        breaking_changes:
          type: array
          items:
            type: string
        improvements:
          type: array
          items:
            type: string
        corrections:
          type: array
          items:
            type: string
        validation:
          type: array
          items:
            type: string
      required:
        - summary
        - highlights
        - breaking_changes
        - improvements
        - corrections
        - validation
      additionalProperties: false
    prompt: |
      Revise as release notes abaixo para clareza e precisão.

      ${nodes.draft_release_notes.output}

      Responda somente com JSON.
