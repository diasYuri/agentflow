version: "1"
name: product-spec-to-implementation
description: "Lê uma spec de produto em Markdown, gera specs técnicas, quebra em planos e implementa cada plano."

inputs:
  spec_path:
    type: string
    required: true

defaults:
  timeout: 900
  retries: 0
  working_dir: "."

execution:
  max_concurrency: 4
  fail_fast: false
  max_node_output_bytes: 1048576

nodes:
  - id: load_product_spec
    kind: bash
    command: |
      cat "${inputs.spec_path}"
    capture:
      stdout: true
      stderr: true
      exit_code: true

  - id: draft_technical_specs
    kind: agent
    provider: codex
    depends_on: [load_product_spec]
    prompt: |
      Você é um arquiteto de software sênior.

      A partir da spec de produto abaixo, produza 1..n especificações técnicas independentes e implementáveis.

      Regras:
      - Preserve os requisitos da spec original.
      - Se houver ambiguidade, crie uma tech spec de esclarecimento em vez de inventar detalhes.
      - Cada tech spec deve ser pequena o suficiente para virar uma unidade de implementação.
      - Retorne JSON válido seguindo o schema.

      Spec de produto:
      ${nodes.load_product_spec.stdout}
    output_schema:
      type: object
      required:
        - technical_specs
      properties:
        technical_specs:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - id
              - title
              - goal
              - scope
              - acceptance_criteria
              - implementation_notes
            properties:
              id:
                type: string
              title:
                type: string
              goal:
                type: string
              scope:
                type: array
                items:
                  type: string
              dependencies:
                type: array
                items:
                  type: string
              risks:
                type: array
                items:
                  type: string
              acceptance_criteria:
                type: array
                items:
                  type: string
              implementation_notes:
                type: array
                items:
                  type: string

  - id: extract_technical_specs
    kind: transform
    depends_on: [draft_technical_specs]
    operation: pick
    input: "${nodes.draft_technical_specs.output}"
    with:
      path: technical_specs

  - id: per_technical_spec
    kind: map
    depends_on: [extract_technical_specs]
    for_each: "${nodes.extract_technical_specs.output}"
    concurrency: 2
    max_items: 20
    fail_fast: false
    nodes:
      - id: break_plans
        kind: agent
        provider: codex
        prompt: |
          Você recebe uma especificação técnica e deve quebrá-la em 1..n planos de execução.

          Regras:
          - Os planos devem ser pequenos, ordenados e não sobrepostos.
          - Cada plano precisa ser implementável de forma objetiva.
          - Pense em arquivos, passos de implementação e validação.
          - Retorne JSON válido como uma lista de planos.

          Especificação técnica:
          ${item}
        output_schema:
          type: array
          items:
            type: object
            required:
              - id
              - title
              - objective
              - files_to_touch
              - implementation_steps
              - validation
              - dependencies
              - notes
            properties:
              id:
                type: string
              title:
                type: string
              objective:
                type: string
              files_to_touch:
                type: array
                items:
                  type: string
              implementation_steps:
                type: array
                items:
                  type: string
              validation:
                type: array
                items:
                  type: string
              dependencies:
                type: array
                items:
                  type: string
              notes:
                type: array
                items:
                  type: string

      - id: per_plan
        kind: map
        depends_on: [break_plans]
        for_each: "${nodes.break_plans.output}"
        concurrency: 2
        max_items: 40
        fail_fast: false
        nodes:
          - id: implement_plan
            kind: agent
            provider: codex
            continue_on_error: true
            permission:
              write: true
            prompt: |
              Você é o agente de implementação e está operando no repositório atual.

              Implemente somente este plano:
              ${item}

              Regras:
              - Não reverta nem sobrescreva mudanças de outros planos.
              - Faça a menor mudança possível para cumprir o plano.
              - Preserve estilo, naming e convenções existentes.
              - Se houver dependências entre planos, avance apenas o que for seguro neste escopo.
              - Depois de implementar, retorne um resumo objetivo do que mudou.
            output_schema:
              type: object
              required:
                - status
                - files_changed
                - summary
                - validation_notes
              properties:
                status:
                  type: string
                files_changed:
                  type: array
                  items:
                    type: string
                summary:
                  type: string
                validation_notes:
                  type: array
                  items:
                    type: string

  - id: collect_implementations
    kind: transform
    depends_on: [per_technical_spec]
    operation: flat_map
    input: "${nodes.per_technical_spec.outputs}"

  - id: summarize_implementation
    kind: agent
    provider: codex
    depends_on: [collect_implementations]
    continue_on_error: true
    prompt: |
      Consolide o resultado final do workflow.

      Tech specs:
      ${nodes.draft_technical_specs.output}

      Implementações consolidadas:
      ${nodes.collect_implementations.output}

      Entregue um resumo curto com:
      - status geral
      - specs técnicas processadas
      - planos implementados
      - pendências ou riscos
